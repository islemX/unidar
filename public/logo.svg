<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 170" width="580" height="170"
     role="img" aria-label="UNIDAR animated logo">
  <defs>
    <!-- Typography: Sora for a premium geometric wordmark + Space Mono for tagline -->
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Sora:wght@700;800&amp;family=Space+Mono:wght@400;700&amp;display=swap');
      .u-word { font-family: 'Sora', 'Segoe UI', sans-serif; font-weight: 800;
                font-feature-settings: "ss01","ss02"; }
      .u-tag  { font-family: 'Space Mono', ui-monospace, monospace; font-weight: 400; }
    </style>

    <!-- Gradient for the mark (cycles through 4 hues) -->
    <linearGradient id="markGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1">
        <animate attributeName="stop-color"
                 values="#6366f1;#0ea5e9;#8b5cf6;#ec4899;#6366f1"
                 dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#0ea5e9">
        <animate attributeName="stop-color"
                 values="#0ea5e9;#8b5cf6;#ec4899;#6366f1;#0ea5e9"
                 dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Wordmark gradient — sweeps horizontally and shifts hue -->
    <linearGradient id="textGrad" x1="-30%" y1="0%" x2="30%" y2="0%">
      <stop offset="0%" stop-color="#6366f1">
        <animate attributeName="stop-color"
                 values="#6366f1;#0ea5e9;#8b5cf6;#ec4899;#6366f1"
                 dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#0ea5e9">
        <animate attributeName="stop-color"
                 values="#0ea5e9;#8b5cf6;#ec4899;#6366f1;#0ea5e9"
                 dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#ec4899">
        <animate attributeName="stop-color"
                 values="#ec4899;#6366f1;#0ea5e9;#8b5cf6;#ec4899"
                 dur="5s" repeatCount="indefinite"/>
      </stop>
      <animate attributeName="x1" values="-50%;50%;-50%" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="50%;150%;50%"  dur="5s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Shimmer highlight that slides across the text -->
    <linearGradient id="shineGrad" x1="-100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="45%"  stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="55%"  stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
      <animate attributeName="x1" values="-100%;120%" dur="4s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0%;220%"    dur="4s" begin="1s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Soft glow for the mark -->
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="b1"/>
      <feGaussianBlur stdDeviation="6"   result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Left-to-right wipe-in mask for the wordmark reveal -->
    <clipPath id="wordReveal">
      <rect x="0" y="0" width="0" height="160">
        <animate attributeName="width" from="0" to="420"
                 dur="1.1s" begin="0.2s" fill="freeze"
                 calcMode="spline" keySplines="0.2 0.7 0.2 1"/>
      </rect>
    </clipPath>

    <!-- Reusable house/shield mark -->
    <symbol id="houseMark" viewBox="0 0 100 110">
      <path d="M50 4 L92 22 V60 C92 84 74 100 50 106 C26 100 8 84 8 60 V22 Z"
            fill="url(#markGrad)"/>
      <!-- Inner U-house cutout -->
      <path d="M50 28 L74 44 V70 H58 V56 H42 V70 H26 V44 Z"
            fill="#ffffff" fill-opacity="0.95"/>
      <!-- Door window (blinking warm light) -->
      <rect x="44" y="58" width="12" height="12" fill="#fbbf24">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="2.2s" repeatCount="indefinite"/>
      </rect>
      <!-- Chimney dot -->
      <circle cx="66" cy="36" r="3" fill="#ffffff" fill-opacity="0.9"/>
    </symbol>
  </defs>

  <!-- ═══ MARK ═══ -->
  <g transform="translate(28 30)">

    <!-- Pulsing aura ring behind the shield -->
    <g opacity="0.5">
      <circle cx="55" cy="55" r="52" fill="none" stroke="url(#markGrad)" stroke-width="1.2">
        <animate attributeName="r"       values="52;66" dur="2.6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.55;0" dur="2.6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="55" cy="55" r="52" fill="none" stroke="url(#markGrad)" stroke-width="1.2">
        <animate attributeName="r"       values="52;66" dur="2.6s" begin="1.3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.55;0" dur="2.6s" begin="1.3s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Shield with float + subtle tilt wobble -->
    <g filter="url(#softGlow)">
      <g>
        <animateTransform attributeName="transform" type="translate"
                          values="0 0; 0 -4; 0 0" dur="3.2s" repeatCount="indefinite"
                          calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
        <g>
          <animateTransform attributeName="transform" type="rotate"
                            values="-2.5 55 55; 2.5 55 55; -2.5 55 55"
                            dur="5s" repeatCount="indefinite"
                            calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
          <!-- Intro pop-in -->
          <g opacity="0">
            <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze"/>
            <animateTransform attributeName="transform" type="scale"
                              values="0.6;1.1;1" keyTimes="0;0.65;1"
                              dur="0.7s" fill="freeze"/>
            <use href="#houseMark" width="110" height="110"/>
          </g>
        </g>
      </g>
    </g>

    <!-- Orbiting spark (with trailing twin) -->
    <g>
      <animateTransform attributeName="transform" type="rotate"
                        from="0 55 55" to="360 55 55"
                        dur="7s" repeatCount="indefinite"/>
      <circle cx="55" cy="4" r="3.5" fill="#fde68a" filter="url(#softGlow)">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="55" cy="4" r="2" fill="#fde68a" opacity="0.5"
              transform="rotate(-20 55 55)"/>
      <circle cx="55" cy="4" r="1.2" fill="#fde68a" opacity="0.3"
              transform="rotate(-35 55 55)"/>
    </g>

    <!-- Floating particles rising around the mark -->
    <g fill="#a78bfa" opacity="0.8">
      <circle cx="20" cy="100" r="1.4">
        <animate attributeName="cy" values="100;10" dur="4s" begin="0.2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;1;0" dur="4s" begin="0.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="90" cy="100" r="1.2">
        <animate attributeName="cy" values="100;10" dur="4.6s" begin="1.1s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;1;0" dur="4.6s" begin="1.1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="55" cy="105" r="1" fill="#22d3ee">
        <animate attributeName="cy" values="105;8" dur="5.2s" begin="2.3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;1;0" dur="5.2s" begin="2.3s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- ═══ WORDMARK ═══ -->
  <g transform="translate(160 0)">

    <!-- Wordmark inside a left-to-right reveal clip -->
    <g clip-path="url(#wordReveal)">
      <!-- Base colored fill -->
      <text x="0" y="100" class="u-word" font-size="66" letter-spacing="1"
            fill="url(#textGrad)">UNIDAR</text>
      <!-- Shimmer overlay -->
      <text x="0" y="100" class="u-word" font-size="66" letter-spacing="1"
            fill="url(#shineGrad)">UNIDAR</text>
    </g>

    <!-- Continuous subtle breathing on the full wordmark -->
    <g>
      <animateTransform attributeName="transform" type="translate"
                        values="0 0; 0 -1.5; 0 0" dur="3.6s"
                        begin="1.3s" repeatCount="indefinite"/>
    </g>

    <!-- Double-layer underline: static thin base + sweeping bright glide -->
    <line x1="0" y1="114" x2="300" y2="114"
          stroke="url(#markGrad)" stroke-width="1.5"
          opacity="0.35" stroke-linecap="round"/>
    <line x1="0" y1="114" x2="300" y2="114"
          stroke="url(#markGrad)" stroke-width="3" stroke-linecap="round"
          stroke-dasharray="80 220" stroke-dashoffset="300">
      <animate attributeName="stroke-dashoffset"
               values="300;-80" dur="3.5s" begin="1.2s" repeatCount="indefinite"/>
    </line>

    <!-- Tagline with typewriter reveal + blinking cursor -->
    <g class="u-tag">
      <text x="2" y="140" font-size="12" letter-spacing="3" fill="#64748b"
            clip-path="url(#wordReveal)">
        student · housing · community
      </text>
    </g>
  </g>
</svg>
